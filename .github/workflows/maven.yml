name: Test Automation Workflow
on:
  # schedule:
    # - cron: 0 18 * * *
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: maven
    - name: Running Test Automation Framework with Maven
      run: mvn test -Dbrowser=chrome -DisLamdaTest=false -DisHeadless=true -X

    - name: Upload Test Logs
      if: always()
      uses: actions/upload-artifact@v7.0.1
      with: 
        name: Test logs
        path: logs/

    - name: Upload Test Reports
      if: always()
      uses: actions/upload-artifact@v7.0.1
      with: 
        name: Test Reports
        path: report.html
        
    - name: Test Execution status
      run: echo "Test Exceution status"
